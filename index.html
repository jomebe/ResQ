      --border: #2b2b2b;

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1b1b1b 0, var(--bg) 48%);

      background: rgba(23, 23, 23, 0.92);
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--red);
      font-weight: 800;
      color: white;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
    .meta {
      display: grid;
      gap: 8px;
      margin: 20px 0;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #101010;
      color: var(--muted);
      font-size: 13px;
    }
    .meta strong { color: var(--text); font-weight: 650; }
    a.button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      border-radius: 10px;
      background: var(--red);
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
    }
    .links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 16px;
      font-size: 13px;
    }
    .links a { color: var(--muted); }
  </style>
</head>
